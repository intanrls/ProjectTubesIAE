services:

  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - order-service
      - inventory-service
      - expedition-service
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - fulfillment-network

  order-service:
    build:
      context: ./102022400005_Order-Services-main
    container_name: order-service
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - fulfillment-network

  inventory-service:
    build:
      context: ./102022400047_inventory-service-main
    container_name: inventory-service
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - fulfillment-network

  expedition-service:
    build:
      context: ./102022400313_Expedition-Service-main
    container_name: expedition-service
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - fulfillment-network

networks:
  fulfillment-network:
    driver: bridge